name: Multi-Env DeploymentPipeline

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '8.0.x'

jobs:

# 🔹 DEV DEPLOYMENT
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build
        run: |
          dotnet restore
          dotnet build --configuration Release
          dotnet publish -c Release -o publish
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-artifact
          path: ./publish  

      - name: Azure Login (DEV)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to DEV
        uses: azure/webapps-deploy@v3
        with:
          app-name: webapi-githubaction
          package: ./publish

# 🔹 PROD DEPLOYMENT (WITH APPROVAL)
  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
        # Download artifact (FIX YOUR ERROR)
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-artifact
          path: ./publish

      - name: Azure Login (PROD)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to PROD
        uses: azure/webapps-deploy@v3
        with:
          app-name: webapi-githubaction-prod
          package: ./publish