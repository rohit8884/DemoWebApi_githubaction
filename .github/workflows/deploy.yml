name: Docker Deploy to Azure

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: demo-webapi

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:

      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 🐳 Login to ACR
      - name: Docker Login
        run: |
          docker login ${{ secrets.ACR_LOGIN_SERVER }} \
          -u ${{ secrets.ACR_USERNAME }} \
          -p ${{ secrets.ACR_PASSWORD }}

      # 🏗️ Build Docker Image
      - name: Build Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest .

      # 📦 Push Image to ACR
      - name: Push Image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # 🚀 Deploy to App Service
      - name: Deploy Container
        uses: azure/webapps-deploy@v3
        with:
          app-name: webapi-githubaction-prod
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest